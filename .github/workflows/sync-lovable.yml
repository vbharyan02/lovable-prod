name: Sync from Lovable

on:
  workflow_dispatch:
    inputs:
      lovable_repo:
        description: "Lovable repo name (e.g. my-app)"
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Clone Lovable source repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/vbharyan02/${{ github.event.inputs.lovable_repo }} /tmp/lovable-src

      - name: Create feature branch
        run: |
          git checkout -b feature/lovable-${{ github.event.inputs.lovable_repo }}

      - name: Rsync files from source
        run: |
          rsync -av --delete --exclude='.git' --exclude='.github' /tmp/lovable-src/ .

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Sync from Lovable: ${{ github.event.inputs.lovable_repo }}"

      - name: Push branch
        run: |
          git push origin feature/lovable-${{ github.event.inputs.lovable_repo }}

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create \
            --title "Lovable sync: ${{ github.event.inputs.lovable_repo }}" \
            --body "Automated sync from [vbharyan02/${{ github.event.inputs.lovable_repo }}](https://github.com/vbharyan02/${{ github.event.inputs.lovable_repo }})." \
            --base main \
            --head feature/lovable-${{ github.event.inputs.lovable_repo }}
